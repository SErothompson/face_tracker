{% extends "base.html" %}

{% block title %}Verify Two-Factor Authentication - Skin Health Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">Two-Factor Verification</h3>
                <p class="text-muted text-center">Enter the 6-digit code from your authenticator app.</p>

                <form method="POST" action="{{ url_for('auth.verify_2fa') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label for="code" class="form-label">Verification Code</label>
                        <input type="text" class="form-control text-center" id="code" name="code"
                               maxlength="8" placeholder="000000 or recovery code"
                               required autofocus autocomplete="one-time-code">
                        <div class="form-text">Enter your TOTP code or a recovery code.</div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Verify</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
