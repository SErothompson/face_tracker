{% extends "base.html" %}

{% block title %}Initial Setup - Skin Health Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-primary">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0">Welcome to Skin Health Tracker</h4>
            </div>
            <div class="card-body p-4">
                <p class="text-muted text-center">
                    Create the first administrator account to get started.
                </p>
                <form method="POST" action="{{ url_for('auth.setup') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label for="username" class="form-label">Admin Username</label>
                        <input type="text" class="form-control" id="username" name="username"
                               minlength="3" required autofocus>
                        <div class="form-text">At least 3 characters.</div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password"
                               minlength="8" required>
                        <div class="form-text">At least 8 characters.</div>
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="confirm_password"
                               name="confirm_password" minlength="8" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Create Admin Account</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
